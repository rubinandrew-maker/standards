<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Right to Dream Unit Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@600&display=swap" rel="stylesheet">

  <!-- Firebase (compat SDK — CDN) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #F8F5F0;
      --bg-card:      #FFFFFF;
      --bg-sidebar:   #EFEBE4;
      --header-bg:    #1D3557;
      --accent:       #E07B39;
      --accent-light: #FFF4EA;
      --text:         #2C2C2C;
      --text-sec:     #5A5A5A;
      --text-light:   #9A9A9A;
      --border:       #DDD9D3;
      --shadow-sm:    0 1px 3px rgba(0,0,0,.07);
      --shadow-md:    0 3px 10px rgba(0,0,0,.10);

      --rl:  #1A5276;
      --ri:  #1A7F4B;
      --w:   #B75B0F;
      --sl:  #6C3483;

      --u1: #C0392B;
      --u2: #B7770D;
      --u3: #1A8C4E;
      --u4: #2471A3;
      --u5: #7D3C98;
      --u6: #0E8C7A;
    }

    html, body { height: 100%; font-family: 'Inter', sans-serif; color: var(--text); background: var(--bg); }
    body { display: flex; flex-direction: column; overflow: hidden; }

    /* ── HEADER ──────────────────────────────────────────── */
    header {
      background: var(--header-bg);
      color: #fff;
      padding: 0 20px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      box-shadow: 0 2px 10px rgba(0,0,0,.25);
      z-index: 10;
    }
    .header-left { display: flex; align-items: center; gap: 20px; flex: 1; min-width: 0; }
    header h1 {
      font-family: 'Lora', serif;
      font-size: 1.12rem;
      font-weight: 600;
      letter-spacing: .02em;
      white-space: nowrap;
    }

    /* Main-view header controls */
    #mainCtrl { display: flex; align-items: center; gap: 20px; }
    .grade-tabs { display: flex; gap: 4px; }
    .grade-tab {
      padding: 5px 15px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,.3);
      background: transparent;
      color: rgba(255,255,255,.75);
      cursor: pointer;
      font: 500 .82rem 'Inter', sans-serif;
      transition: background .14s, color .14s;
    }
    .grade-tab:hover  { background: rgba(255,255,255,.12); color: #fff; }
    .grade-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* Detail-view header controls */
    #detailCtrl { display: none; align-items: center; gap: 14px; }
    .btn-back {
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.3);
      color: #fff;
      padding: 5px 13px;
      border-radius: 4px;
      cursor: pointer;
      font: 500 .82rem 'Inter', sans-serif;
      transition: background .14s;
      white-space: nowrap;
    }
    .btn-back:hover { background: rgba(255,255,255,.28); }
    .detail-hdr-title {
      font-size: .92rem;
      font-weight: 600;
      color: rgba(255,255,255,.92);
      white-space: nowrap;
    }

    /* Connection status pill */
    .conn-pill {
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .03em;
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid transparent;
      white-space: nowrap;
      transition: color .3s, border-color .3s;
      flex-shrink: 0;
    }
    .conn-pill.connecting { color: rgba(255,255,255,.4);  border-color: rgba(255,255,255,.15); }
    .conn-pill.live       { color: #6EE7B7;               border-color: rgba(110,231,183,.35); }
    .conn-pill.error      { color: #FCA5A5;               border-color: rgba(252,165,165,.35); }

    .header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .btn {
      padding: 6px 13px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,.35);
      background: transparent;
      color: rgba(255,255,255,.85);
      cursor: pointer;
      font: 500 .78rem 'Inter', sans-serif;
      transition: background .14s, color .14s;
      white-space: nowrap;
    }
    .btn:hover { background: rgba(255,255,255,.12); color: #fff; }

    /* ── MAIN PLANNING LAYOUT ────────────────────────────── */
    .app-layout { display: flex; flex: 1; overflow: hidden; }

    /* ── SIDEBAR ─────────────────────────────────────────── */
    .sidebar {
      width: 222px;
      flex-shrink: 0;
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .pane-head {
      padding: 11px 14px 9px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .pane-head h2 {
      font-size: .70rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .09em;
      color: var(--text-sec);
    }
    .sidebar-body { flex: 1; overflow-y: auto; padding: 4px 0 10px; }

    .sb-strand-label {
      font-size: .60rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      padding: 8px 14px 3px;
    }
    .cov-row { display: flex; align-items: center; gap: 6px; padding: 3px 14px; }
    .cov-code { font-size: .67rem; font-weight: 600; min-width: 54px; font-variant-numeric: tabular-nums; }
    .cov-bar-wrap { flex: 1; height: 5px; background: #D5D1CB; border-radius: 3px; overflow: hidden; }
    .cov-bar { height: 100%; border-radius: 3px; transition: width .3s ease; }
    .cov-count { font-size: .63rem; font-weight: 700; color: var(--text-light); min-width: 14px; text-align: right; }
    .cov-count.hit { color: var(--text-sec); }

    /* ── STANDARDS POOL ──────────────────────────────────── */
    .standards-pool {
      width: 338px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }
    .pool-head-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 14px 9px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .pool-hint { font-size: .63rem; color: var(--text-light); }
    .pool-body { flex: 1; overflow-y: auto; padding: 4px 0 8px; }

    .strand-section { }
    .strand-header {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 10px;
      cursor: pointer;
      user-select: none;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 1;
      border-bottom: 1px solid transparent;
    }
    .strand-header:hover { background: #F0EDE8; }
    .strand-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .strand-name { font-size: .70rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; flex: 1; }
    .strand-count { font-size: .63rem; color: var(--text-light); }
    .strand-chevron { font-size: .64rem; color: var(--text-light); transition: transform .2s; }
    .strand-section.collapsed .strand-chevron { transform: rotate(-90deg); }
    .strand-section.collapsed .strand-header { border-bottom-color: var(--border); }
    .strand-cards { padding: 4px 8px 6px; }
    .strand-section.collapsed .strand-cards { display: none; }

    .std-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left-width: 3px;
      border-radius: 5px;
      padding: 7px 9px;
      margin-bottom: 4px;
      cursor: grab;
      transition: box-shadow .15s, transform .1s;
    }
    .std-card:hover { box-shadow: var(--shadow-md); }
    .std-card.dragging { opacity: .4; transform: scale(.97); cursor: grabbing; }
    .std-card-code { font-size: .67rem; font-weight: 700; color: var(--text-sec); margin-bottom: 2px; letter-spacing: .03em; }
    .std-card-desc {
      font-size: .69rem; color: var(--text); line-height: 1.42;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .std-card-pips { display: flex; gap: 3px; margin-top: 5px; flex-wrap: wrap; }
    .pip {
      width: 15px; height: 15px; border-radius: 3px;
      display: flex; align-items: center; justify-content: center;
      font-size: .55rem; font-weight: 700; color: #fff; flex-shrink: 0;
    }

    /* ── UNIT AREA ───────────────────────────────────────── */
    .unit-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .unit-area-head {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px 9px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--bg);
    }
    .unit-area-hint { font-size: .63rem; color: var(--text-light); }

    .unit-grid {
      flex: 1;
      overflow-y: auto;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-auto-rows: minmax(0, 1fr);
      gap: 10px;
      padding: 10px;
      background: var(--bg);
    }

    .unit-col {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 7px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 170px;
      transition: box-shadow .15s;
      cursor: default;
    }
    .unit-col:hover { box-shadow: var(--shadow-sm); }
    .unit-col.drag-over { box-shadow: 0 0 0 2px var(--accent), var(--shadow-md); background: var(--accent-light); }

    .unit-col-head {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 7px;
      flex-shrink: 0;
      cursor: pointer;
    }
    .unit-badge {
      width: 22px; height: 22px; border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      font-size: .72rem; font-weight: 700; color: #fff; flex-shrink: 0;
    }
    .unit-col-title { font-size: .78rem; font-weight: 600; }
    .unit-std-count { font-size: .63rem; color: var(--text-light); font-weight: 500; }
    .unit-open-hint {
      margin-left: auto;
      font-size: .65rem;
      color: var(--text-light);
      opacity: 0;
      transition: opacity .15s;
      user-select: none;
    }
    .unit-col:hover .unit-open-hint { opacity: 1; }

    .unit-drop-zone { flex: 1; overflow-y: auto; padding: 7px; }
    .unit-empty {
      height: 100%; min-height: 50px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-light); font-size: .67rem;
      border: 2px dashed var(--border); border-radius: 5px;
      text-align: center; padding: 10px;
    }
    .unit-std-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 5px 7px;
      margin-bottom: 4px;
      display: flex;
      align-items: flex-start;
      gap: 5px;
    }
    .unit-std-info { flex: 1; min-width: 0; }
    .unit-std-code { font-size: .66rem; font-weight: 700; color: var(--text-sec); }
    .unit-std-desc {
      font-size: .66rem; color: var(--text); line-height: 1.35; margin-top: 1px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .unit-std-remove {
      background: none; border: none; color: var(--text-light); cursor: pointer;
      font-size: 1rem; line-height: 1; width: 16px; height: 16px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 3px; flex-shrink: 0; margin-top: 1px; padding: 0;
      transition: background .12s, color .12s;
    }
    .unit-std-remove:hover { background: #FFE0D4; color: #C0392B; }

    .unit--1 .unit-badge { background: var(--u1); }
    .unit--2 .unit-badge { background: var(--u2); }
    .unit--3 .unit-badge { background: var(--u3); }
    .unit--4 .unit-badge { background: var(--u4); }
    .unit--5 .unit-badge { background: var(--u5); }
    .unit--6 .unit-badge { background: var(--u6); }

    /* ── ELA / HUMANITIES TOGGLE ─────────────────────────── */
    .unit-type-toggle {
      display: flex;
      background: rgba(0,0,0,.07);
      border-radius: 5px;
      padding: 2px;
      gap: 2px;
      flex-shrink: 0;
    }
    .toggle-btn {
      padding: 3px 13px;
      border: none;
      border-radius: 3px;
      background: transparent;
      cursor: pointer;
      font: 600 .72rem 'Inter', sans-serif;
      color: var(--text-sec);
      transition: background .14s, color .14s;
    }
    .toggle-btn.active {
      background: var(--bg-card);
      color: var(--text);
      box-shadow: 0 1px 3px rgba(0,0,0,.12);
    }

    /* Humanities unit column — subtle header tint + "H" chip */
    .unit-col.hum .unit-col-head { background: #F5F3FF; }
    .hum-chip {
      font-size: .53rem; font-weight: 800; text-transform: uppercase;
      letter-spacing: .04em; padding: 1px 4px; border-radius: 3px;
      background: #DDD6FE; color: #5B21B6;
      flex-shrink: 0; line-height: 1.5;
    }

    /* ── DETAIL VIEW ─────────────────────────────────────── */
    .detail-view {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    /* Scrollable main content column */
    .detail-main {
      flex: 1;
      overflow-y: auto;
      background: var(--bg);
      padding: 24px 20px 32px;
    }
    .detail-inner {
      max-width: 860px;
      margin: 0 auto;
    }
    /* Assessment timeline sidebar (right side of detail view) */
    .detail-sidebar {
      width: 222px;
      flex-shrink: 0;
      background: var(--bg-sidebar);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .detail-sidebar-body {
      flex: 1;
      overflow-y: auto;
      padding: 6px 0 10px;
    }
    .detail-sb-empty {
      padding: 14px 14px;
      font-size: .70rem;
      color: var(--text-light);
      font-style: italic;
      line-height: 1.5;
    }
    /* Week group */
    .detail-sb-week { padding-bottom: 4px; }
    .detail-sb-week + .detail-sb-week {
      border-top: 1px solid var(--border);
      padding-top: 4px;
      margin-top: 2px;
    }
    .detail-sb-week-hdr {
      font-size: .60rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--text-light);
      padding: 5px 14px 2px;
    }
    .detail-sb-row {
      padding: 4px 14px;
      font-size: .70rem;
      line-height: 1.5;
    }
    .detail-sb-row:hover { background: rgba(0,0,0,.03); }
    .detail-sb-code {
      font-weight: 700;
      color: var(--text);
      display: block;
      font-size: .67rem;
      letter-spacing: .02em;
    }
    .detail-sb-meta {
      color: var(--text-sec);
      font-size: .67rem;
    }
    .detail-sb-date {
      font-weight: 600;
      color: var(--accent);
    }
    .detail-empty {
      padding: 70px 20px;
      text-align: center;
      color: var(--text-light);
      font-size: .9rem;
    }

    /* Standard block in detail view */
    .std-detail-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left-width: 4px;
      border-radius: 8px;
      padding: 18px 20px 16px;
      margin-bottom: 14px;
      box-shadow: var(--shadow-sm);
    }
    .std-detail-code {
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .05em;
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .std-detail-desc {
      font-size: .9rem;
      color: var(--text);
      line-height: 1.6;
      margin-bottom: 16px;
    }
    .asmt-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin-bottom: 12px;
    }
    .asmt-rows { display: flex; flex-direction: column; gap: 11px; }
    /* Each row is now two lines: controls on top, description below */
    .asmt-row { display: flex; flex-direction: column; gap: 5px; }
    .asmt-row-top { display: flex; align-items: center; gap: 12px; }
    .asmt-row-bottom {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-left: 104px; /* label min-width(92) + gap(12) */
    }
    .asmt-label {
      font-size: .72rem;
      font-weight: 600;
      color: var(--text-sec);
      min-width: 92px;
    }
    .asmt-desc {
      flex: 1;
      padding: 5px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font: 400 .78rem 'Inter', sans-serif;
      color: var(--text);
      background: var(--bg-card);
    }
    .asmt-desc:focus { outline: 2px solid var(--accent); outline-offset: 1px; border-color: transparent; }
    .asmt-word-count {
      font-size: .63rem;
      color: var(--text-light);
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }
    .asmt-word-count.at-limit { color: #C0392B; font-weight: 600; }
    .asmt-select {
      padding: 5px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font: 400 .78rem 'Inter', sans-serif;
      color: var(--text);
      background: var(--bg-card);
      cursor: pointer;
      min-width: 148px;
    }
    .asmt-select:focus { outline: 2px solid var(--accent); outline-offset: 1px; border-color: transparent; }
    .asmt-date {
      padding: 5px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font: 400 .78rem 'Inter', sans-serif;
      color: var(--text);
      background: var(--bg-card);
    }
    .asmt-date:focus { outline: 2px solid var(--accent); outline-offset: 1px; border-color: transparent; }

    /* ── UNIT OVERVIEW ───────────────────────────────────── */
    .overview-section {
      margin-bottom: 24px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    /* Published state — clean, no box */
    .overview-published { position: relative; }
    .overview-text {
      font-size: .98rem;
      line-height: 1.75;
      color: var(--text);
    }
    .overview-edit-btn {
      position: absolute;
      top: -2px; right: -2px;
      background: none;
      border: 1px solid transparent;
      border-radius: 4px;
      color: var(--text-light);
      cursor: pointer;
      font: 500 .68rem 'Inter', sans-serif;
      padding: 3px 7px;
      opacity: 0;
      transition: opacity .15s, background .12s, border-color .12s;
    }
    .overview-published:hover .overview-edit-btn {
      opacity: 1;
    }
    .overview-edit-btn:hover {
      background: #F0EDE8;
      border-color: var(--border);
      color: var(--text-sec);
    }
    /* Edit state */
    .overview-editor-wrap { display: flex; flex-direction: column; gap: 9px; }
    .overview-textarea {
      width: 100%;
      min-height: 100px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font: 400 .9rem 'Inter', sans-serif;
      color: var(--text);
      background: var(--bg);
      resize: vertical;
      line-height: 1.65;
    }
    .overview-textarea:focus { outline: 2px solid var(--accent); outline-offset: 1px; border-color: transparent; }
    .overview-toolbar { display: flex; align-items: center; gap: 8px; }
    .overview-bold-btn {
      padding: 4px 11px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg-card);
      font: 700 .82rem 'Inter', sans-serif;
      cursor: pointer;
      color: var(--text-sec);
      transition: background .12s;
    }
    .overview-bold-btn:hover { background: #EDEAE5; }
    .overview-publish-btn {
      padding: 5px 16px;
      background: var(--accent);
      border: none;
      border-radius: 4px;
      color: #fff;
      font: 600 .78rem 'Inter', sans-serif;
      cursor: pointer;
      transition: opacity .14s;
    }
    .overview-publish-btn:hover { opacity: .87; }

    /* ── ENDURING UNDERSTANDINGS / ESSENTIAL QUESTIONS ─── */
    .ud-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-left: 4px solid var(--border);
      border-radius: 8px;
      padding: 18px 20px 14px;
      margin-bottom: 14px;
      box-shadow: var(--shadow-sm);
    }
    .ud-card-hdr {
      font-size: .70rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-sec);
      margin-bottom: 13px;
    }
    .ud-row {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 7px;
    }
    .ud-num {
      font-size: .72rem;
      font-weight: 600;
      color: var(--text-light);
      min-width: 20px;
      text-align: right;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }
    .ud-input {
      flex: 1;
      padding: 6px 9px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font: 400 .82rem 'Inter', sans-serif;
      color: var(--text);
      background: var(--bg);
    }
    .ud-input:focus { outline: 2px solid var(--accent); outline-offset: 1px; border-color: transparent; }
    .ud-add-btn {
      background: none;
      border: none;
      padding: 3px 0 0 29px; /* align with inputs (num min-width + gap) */
      font: 500 .72rem 'Inter', sans-serif;
      color: var(--text-light);
      cursor: pointer;
      display: block;

/* =====================================================
   ASSESSMENT TIMELINE HELPERS
===================================================== */

/* Format "2026-10-15" → "Oct 15" */
function fmtDate(iso) {
  if (!iso) return '';
  const [, m, d] = iso.split('-').map(Number);
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${MONTHS[m - 1]} ${d}`;
}

/*
 * Sort key for a standard ID.
 * Primary:  the numeric portion (6.1 < 6.2 < 6.10)
 * Secondary: strand order RL < RI < W < SL
 */
const STRAND_ORDER = { RL: 0, RI: 1, W: 2, SL: 3 };

function stdSortKey(sid) {
  const dot1 = sid.indexOf('.');
  const prefix = sid.slice(0, dot1);               // "RL", "RI", "W", "SL"
  const rest   = sid.slice(dot1 + 1);              // "6.1"
  const num    = parseFloat(rest);                 // 6.1
  return [num, STRAND_ORDER[prefix] ?? 99];
}

function compareAssessments(a, b) {
  // 1. Date (ISO strings compare lexicographically — correct for dates)
  if (a.date < b.date) return -1;
  if (a.date > b.date) return  1;
  // 2. Numeric portion of standard ID
  const [aN, aS] = stdSortKey(a.sid);
  const [bN, bS] = stdSortKey(b.sid);
  if (aN !== bN) return aN - bN;
  // 3. Strand order
  return aS - bS;
}

/* ── Week helpers ───────────────────────────────────── */
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

/* "2026-10-15" → local Date object */
function isoToDate(iso) {
  const [y, m, d] = iso.split('-').map(Number);
  return new Date(y, m - 1, d);
}

/* Return the Monday of the week containing isoDate */
function mondayOf(isoDate) {
  const dt  = isoToDate(isoDate);
  const day = dt.getDay();                    // 0=Sun … 6=Sat
  const diff = day === 0 ? -6 : 1 - day;     // days back to Monday
  dt.setDate(dt.getDate() + diff);
  return dt;
}

/* Format a Date as "May 5" */
function fmtDateObj(dt) { return `${MONTHS[dt.getMonth()]} ${dt.getDate()}`; }

/* "May 5 – May 11"  or  "Apr 28 – May 4" */
function fmtWeekRange(monday) {
  const sunday = new Date(monday);
  sunday.setDate(sunday.getDate() + 6);
  return `${fmtDateObj(monday)} – ${fmtDateObj(sunday)}`;
}

/* Sortable ISO-style string for a week's Monday (for Map key & ordering) */
function weekKey(isoDate) {
  const mo = mondayOf(isoDate);
  return [
    mo.getFullYear(),
    String(mo.getMonth() + 1).padStart(2, '0'),
    String(mo.getDate()).padStart(2, '0'),
  ].join('-');
}

/* =====================================================
   FIRESTORE — ENCODING / DECODING
===================================================== */
/*
 * Standard IDs (e.g. "RL.6.1") contain dots, which Firestore
 * interprets as nested-path separators in updateDoc field paths.
 * We encode dots as underscores for all Firestore field keys.
 */
function encodeKey(id)  { return id.replace(/\./g, '_'); }
function decodeKey(key) { return key.replace(/_/g, '.'); }

/*
 * Pool-item labels (e.g. "Informational / Nonfiction") may contain slashes,
 * which are not allowed in Firestore field names. Encode as pipe for storage.
 */
function encodeDetailKey(label) { return label.replace(/\//g, '|'); }
function decodeDetailKey(key)   { return key.replace(/\|/g, '/'); }

/* Encode pool assignments: internal → Firestore */
function encodePoolAssignments(pa) {
  const result = {};
  ['6','7','8'].forEach(g => {
    result[g] = {};
    ['1','2','3','4','5','6'].forEach(u => {
      result[g][u] = (pa[g] || {})[u] || [];
    });
  });
  return result;
}

/* Decode pool assignments: Firestore → internal */
function decodePoolAssignments(data) {
  const a = makeDefaultPoolAssignments();
  if (!data) return a;
  ['6','7','8'].forEach(g => {
    if (!data[g]) return;
    ['1','2','3','4','5','6'].forEach(u => {
      if (Array.isArray(data[g][u])) a[g][u] = data[g][u];
    });
  });
  return a;
}

/* Encode detail map: internal { label: text } → Firestore { encodedLabel: text } */
function encodeDetailMap(dm) {
  const result = {};
  ['6','7','8'].forEach(g => {
    result[g] = {};
    ['1','2','3','4','5','6'].forEach(u => {
      result[g][u] = {};
      const unitData = (dm[g] || {})[u] || {};
      Object.entries(unitData).forEach(([label, text]) => {
        result[g][u][encodeDetailKey(label)] = text;
      });
    });
  });
  return result;
}

/* Decode detail map: Firestore → internal */
function decodeDetailMap(data) {
  const a = makeDefaultDetails();
  if (!data) return a;
  ['6','7','8'].forEach(g => {
    if (!data[g]) return;
    ['1','2','3','4','5','6'].forEach(u => {
      if (!data[g][u]) return;
      Object.entries(data[g][u]).forEach(([key, text]) => {
        a[g][u][decodeDetailKey(key)] = text;
      });
    });
  });
  return a;
}

/* Encode unitDetails: internal → Firestore */
function encodeUnitDetails(ud) {
  const result = {};
  ['6','7','8'].forEach(g => {
    result[g] = {};
    ['1','2','3','4','5','6'].forEach(u => {
      const d = (ud[g] || {})[u] || { eu: [], eq: [], overview: '', overviewPublished: false };
      result[g][u] = {
        enduringUnderstandings: d.eu || [],
        essentialQuestions:     d.eq || [],
        overview:               d.overview || '',
        overviewPublished:      !!d.overviewPublished,
      };
    });
  });
  return result;
}

/* Decode unitDetails: Firestore → internal */
function decodeUnitDetails(data) {
  const a = makeDefaultUnitDetails();
  if (!data) return a;
  ['6','7','8'].forEach(g => {
    if (!data[g]) return;
    ['1','2','3','4','5','6'].forEach(u => {
      if (!data[g][u]) return;
      a[g][u] = {
        eu:               Array.isArray(data[g][u].enduringUnderstandings) ? data[g][u].enduringUnderstandings : [],
        eq:               Array.isArray(data[g][u].essentialQuestions)     ? data[g][u].essentialQuestions     : [],
        overview:         typeof data[g][u].overview === 'string'          ? data[g][u].overview              : '',
        overviewPublished: !!data[g][u].overviewPublished,
      };
    });
  });
  return a;
}

/* Encode unit assignments: internal → Firestore */
function encodeUnits(asgn) {
  const units = {};
  ['6','7','8'].forEach(grade => {
    units[grade] = {};
    Object.values(STANDARDS[grade]).flat().forEach(std => {
      units[grade][encodeKey(std.id)] = [];
    });
    ['1','2','3','4','5','6'].forEach(u => {
      const uNum = parseInt(u, 10);
      (asgn[grade][u] || []).forEach(sid => {
        const key = encodeKey(sid);
        if (!units[grade][key].includes(uNum)) units[grade][key].push(uNum);
      });
    });
  });
  return units;
}

/* Decode unit assignments: Firestore → internal */
function decodeUnits(data) {
  const a = makeDefaultAssignments();
  if (!data) return a;
  ['6','7','8'].forEach(grade => {
    if (!data[grade]) return;
    Object.entries(data[grade]).forEach(([encodedKey, unitNums]) => {
      const sid = decodeKey(encodedKey);
      (unitNums || []).forEach(uNum => {
        const key = String(uNum);
        if (a[grade][key] && !a[grade][key].includes(sid)) a[grade][key].push(sid);
      });
    });
  });
  return a;
}

/* Encode assessments: internal → Firestore */
function encodeAssessments(asmts) {
  const result = {};
  ['6','7','8'].forEach(grade => {
    result[grade] = {};
    ['1','2','3','4','5','6'].forEach(u => {
      result[grade][u] = {};
      const unitData = (asmts[grade] || {})[u] || {};
      Object.entries(unitData).forEach(([sid, rows]) => {
        result[grade][u][encodeKey(sid)] = rows;
      });
    });
  });
  return result;
}

/* Decode assessments: Firestore → internal */
function decodeAssessments(data) {
  const a = makeDefaultAssessments();
  if (!data) return a;
  ['6','7','8'].forEach(grade => {
    if (!data[grade]) return;
    ['1','2','3','4','5','6'].forEach(u => {
      if (!data[grade][u]) return;
      Object.entries(data[grade][u]).forEach(([encodedKey, rows]) => {
        const sid = decodeKey(encodedKey);
        a[grade][u][sid] = Array.isArray(rows) ? rows : [{ type:'', date:'' }, { type:'', date:'' }];
      });
    });
  });
  return a;
}

/* =====================================================
   FIRESTORE — READ / WRITE
===================================================== */
function setStatus(state) {
  const el = document.getElementById('connPill');
  el.className = 'conn-pill ' + state;
  if (state === 'live')       el.textContent = '● Live';
  else if (state === 'error') el.textContent = '⚠ Error';
  else                        el.textContent = '○ Connecting…';
}

function startSync() {
  docRef.onSnapshot(
    snap => {
      setStatus('live');
      const data = snap.data() || {};
      assignments            = decodeUnits(data.units);
      assessments            = decodeAssessments(data.assessments);
      genreAssignments       = decodePoolAssignments(data.genreAssignments);
      performanceAssignments = decodePoolAssignments(data.performanceAssignments);
      genreDetails           = decodeDetailMap(data.genreDetails);
      performanceDetails     = decodeDetailMap(data.performanceDetails);
      unitDetails            = decodeUnitDetails(data.unitDetails);
      /* Humanities */
      humAssignments      = decodeUnits(data.humanitiesUnits);
      humAssessments      = decodeAssessments(data.humanitiesAssessments);
      humGenreAssignments  = decodePoolAssignments(data.humanitiesGenreAssignments);
      humPerfAssignments   = decodePoolAssignments(data.humanitiesPerfAssignments);
      humThemeAssignments  = decodePoolAssignments(data.humanitiesThemeAssignments);
      humGenreDetails      = decodeDetailMap(data.humanitiesGenreDetails);
      humPerfDetails       = decodeDetailMap(data.humanitiesPerfDetails);
      humThemeDetails      = decodeDetailMap(data.humanitiesThemeDetails);
      themeAssignments     = decodePoolAssignments(data.themeAssignments);
      themeDetails         = decodeDetailMap(data.themeDetails);
      humUnitDetails      = decodeUnitDetails(data.humanitiesUnitDetails);
      // Only auto-re-render the main view from snapshots;
      // in detail view we skip re-render to preserve input focus.
      if (currentView === 'main') render();
    },
    err => {
      console.error('Firestore onSnapshot error:', err);
      setStatus('error');
    }
  );
}

async function writeToFirestore() {
  try {
    await docRef.set({
      units:                  encodeUnits(assignments),
      assessments:            encodeAssessments(assessments),
      genreAssignments:       encodePoolAssignments(genreAssignments),
      performanceAssignments: encodePoolAssignments(performanceAssignments),
      genreDetails:           encodeDetailMap(genreDetails),
      performanceDetails:     encodeDetailMap(performanceDetails),
      unitDetails:            encodeUnitDetails(unitDetails),
      /* Humanities */
      humanitiesUnits:             encodeUnits(humAssignments),
      humanitiesAssessments:       encodeAssessments(humAssessments),
      humanitiesGenreAssignments:  encodePoolAssignments(humGenreAssignments),
      humanitiesPerfAssignments:   encodePoolAssignments(humPerfAssignments),
      humanitiesThemeAssignments:  encodePoolAssignments(humThemeAssignments),
      humanitiesGenreDetails:      encodeDetailMap(humGenreDetails),
      humanitiesPerfDetails:       encodeDetailMap(humPerfDetails),
      humanitiesThemeDetails:      encodeDetailMap(humThemeDetails),
      themeAssignments:            encodePoolAssignments(themeAssignments),
      themeDetails:                encodeDetailMap(themeDetails),
      humanitiesUnitDetails:       encodeUnitDetails(humUnitDetails),
    });
  } catch (err) {
    console.error('Firestore write error:', err);
    setStatus('error');
  }
}

/* =====================================================
   ACTIVE-CONTEXT HELPERS
   Returns true when the current operation (main view or detail
   view) is operating on the Humanities data set.
===================================================== */
function isHum() {
  return currentView === 'unit'
    ? detailUnitType === 'hum'
    : currentUnitType[currentGrade] === 'hum';
}

function activeAssignments()      { return isHum() ? humAssignments      : assignments; }
function activeAssessments()      { return isHum() ? humAssessments      : assessments; }
function activeGenreAssignments() { return isHum() ? humGenreAssignments : genreAssignments; }
function activePerfAssignments()  { return isHum() ? humPerfAssignments  : performanceAssignments; }
function activeThemeAssignments() { return isHum() ? humThemeAssignments : themeAssignments; }
function activeGenreDetails()     { return isHum() ? humGenreDetails     : genreDetails; }
function activePerfDetails()      { return isHum() ? humPerfDetails      : performanceDetails; }
function activeThemeDetails()     { return isHum() ? humThemeDetails     : themeDetails; }
function activeUnitDetails()      { return isHum() ? humUnitDetails      : unitDetails; }

/* Toggle between ELA and Humanities unit grids (per grade) */
function switchUnitType(type) {
  currentUnitType[currentGrade] = type;
  renderUnitToggle();
  renderUnits();
}

/* =====================================================
   MUTATIONS — UNIT ASSIGNMENTS
===================================================== */
function addToUnit(sid, unit) {
  const key  = String(unit);
  const asgn = activeAssignments();
  if (!asgn[currentGrade][key].includes(sid)) {
    asgn[currentGrade][key].push(sid);
    render();
    writeToFirestore();
  }
}

function removeFromUnit(sid, unit) {
  const key  = String(unit);
  const asgn = activeAssignments();
  const arr  = asgn[currentGrade][key];
  const i    = arr.indexOf(sid);
  if (i > -1) { arr.splice(i, 1); render(); writeToFirestore(); }
}

function switchGrade(g) { currentGrade = g; render(); }

/* =====================================================
   MUTATIONS — POOL ITEMS (Genre & Performance)
===================================================== */
function addPoolItem(poolType, label, unit) {
  const pool = poolType === 'genre' ? activeGenreAssignments()
             : poolType === 'theme' ? activeThemeAssignments()
             : activePerfAssignments();
  const key  = String(unit);
  if (!pool[currentGrade][key].includes(label)) {
    pool[currentGrade][key].push(label);
    render();
    writeToFirestore();
  }
}

/* Called via data attributes on the remove button to avoid inline-JS escaping issues */
function removePoolItem(btn) {
  const { poolType, label, unit } = btn.dataset;
  const pool = poolType === 'genre' ? activeGenreAssignments()
             : poolType === 'theme' ? activeThemeAssignments()
             : activePerfAssignments();
  const key  = String(unit);
  const arr  = pool[currentGrade][key];
  const i    = arr.indexOf(label);
  if (i > -1) { arr.splice(i, 1); render(); writeToFirestore(); }
}

/* Called oninput on pool detail textareas — saves without re-rendering to preserve focus */
function updatePoolDetail(el) {
  const { poolType, label, unit } = el.dataset;
  const detailMap = poolType === 'genre' ? activeGenreDetails()
                  : poolType === 'theme' ? activeThemeDetails()
                  : activePerfDetails();
  if (!detailMap[currentGrade][unit]) detailMap[currentGrade][unit] = {};
  detailMap[currentGrade][unit][label] = el.value;
  writeToFirestore();
}

/* =====================================================
   MUTATIONS — ENDURING UNDERSTANDINGS / ESSENTIAL QUESTIONS
===================================================== */
/*
 * fieldKey: 'eu' | 'eq'
 * Called oninput — does NOT re-render (preserves input focus).
 */
function updateUnitDetailLine(fieldKey, index, value) {
  const u  = String(detailUnit);
  const ud = activeUnitDetails()[currentGrade][u];
  // Extend array defensively in case length < index
  while (ud[fieldKey].length <= index) ud[fieldKey].push('');
  ud[fieldKey][index] = value;
  writeToFirestore();
}

/*
 * Called when the user clicks "+ Add another".
 * Extends the array by 1 (making the new line visible) then re-renders
 * only the top section — standard/genre/perf cards below are untouched.
 */
function revealNextLine(fieldKey) {
  const u  = String(detailUnit);
  const ud = activeUnitDetails()[currentGrade][u];
  // visibleCount: 0-length array means 1 line is shown by default
  const visible = ud[fieldKey].length === 0 ? 1 : ud[fieldKey].length;
  if (visible >= MAX_LINES) return;
  // Bring the array up to `visible` elements first (handles the 0-length case),
  // then push one more empty string for the newly revealed line.
  while (ud[fieldKey].length < visible) ud[fieldKey].push('');
  ud[fieldKey].push('');
  renderDetailTop();
  writeToFirestore();
}

/* =====================================================
   RENDER — EU / EQ TOP SECTION (partial re-render)
===================================================== */
const MAX_LINES = 5;

function buildOverviewSection(ud) {
  const overview  = ud.overview || '';
  const published = ud.overviewPublished && overview.trim() !== '';
  if (published) {
    const safeHtml = overview
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/\n/g, '<br>')
      .replace(/&lt;strong&gt;/g, '<strong>')
      .replace(/&lt;\/strong&gt;/g, '</strong>');
    return `
      <div class="overview-section">
        <div class="overview-published">
          <div class="overview-text">${safeHtml}</div>
          <button class="overview-edit-btn" onclick="editOverview()" title="Edit overview">&#9998; Edit</button>
        </div>
      </div>`;
  } else {
    const escaped = overview.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return `
      <div class="overview-section">
        <div class="overview-editor-wrap">
          <textarea id="overviewEditor" class="overview-textarea"
                    placeholder="Write a unit overview…">${escaped}</textarea>
          <div class="overview-toolbar">
            <button class="overview-bold-btn" onclick="boldOverview()"><strong>B</strong></button>
            <button class="overview-publish-btn" onclick="publishOverview()">Publish</button>
          </div>
        </div>
      </div>`;
  }
}

function publishOverview() {
  const ta = document.getElementById('overviewEditor');
  if (!ta) return;
  const text = ta.value;
  const u    = String(detailUnit);
  const ud   = activeUnitDetails()[currentGrade][u];
  ud.overview          = text;
  ud.overviewPublished = text.trim() !== '';
  renderDetailTop();
  writeToFirestore();
}

function editOverview() {
  const u  = String(detailUnit);
  const ud = activeUnitDetails()[currentGrade][u];
  ud.overviewPublished = false;
  renderDetailTop();
}

function boldOverview() {
  const ta = document.getElementById('overviewEditor');
  if (!ta) return;
  const start = ta.selectionStart, end = ta.selectionEnd;
  if (start === end) return;
  const val = ta.value;
  ta.value  = val.slice(0, start) + '<strong>' + val.slice(start, end) + '</strong>' + val.slice(end);
  const cursor = start + 8 + (end - start) + 9;
  ta.setSelectionRange(cursor, cursor);
}

function buildEuEqSection(fieldKey, sectionLabel, arr, u, accentColor) {
  const visible = arr.length === 0 ? 1 : arr.length;
  const rows = [];
  for (let i = 0; i < visible; i++) {
    const val         = (arr[i] || '').replace(/"/g, '&quot;');
    const placeholder = fieldKey === 'eu'
      ? 'Students will understand that…'
      : 'How does…?';
    rows.push(`
      <div class="ud-row">
        <span class="ud-num">${i + 1}.</span>
        <input type="text" class="ud-input"
               value="${val}"
               placeholder="${placeholder}"
               oninput="updateUnitDetailLine('${fieldKey}',${i},this.value)">
      </div>`);
  }
  const addBtn = visible < MAX_LINES
    ? `<button class="ud-add-btn" onclick="revealNextLine('${fieldKey}')">+ Add another</button>`
    : '';
  return `
    <div class="ud-card" style="border-left-color:${accentColor}">
      <div class="ud-card-hdr">${sectionLabel}</div>
      ${rows.join('')}
      ${addBtn}
    </div>`;
}

function buildDetailTopHtml() {
  const u  = String(detailUnit);
  const ud = (activeUnitDetails()[currentGrade] || {})[u] || { eu: [], eq: [], overview: '', overviewPublished: false };
  return (
    buildOverviewSection(ud) +
    buildEuEqSection('eu', 'Enduring Understandings', ud.eu, u, '#E07B39') +
    buildEuEqSection('eq', 'Essential Questions',     ud.eq, u, '#1D3557')
  );
}

function renderDetailTop() {
  const el = document.getElementById('detailTop');
  if (el) el.innerHTML = buildDetailTopHtml();
}

/* =====================================================
   MUTATIONS — ASSESSMENTS
===================================================== */
function updateAssessment(sid, rowIndex, field, value) {
  const rows = getAssessmentRows(currentGrade, detailUnit, sid);
  rows[rowIndex][field] = value;
  renderDetailSidebar(); // update timeline instantly without touching the inputs
  writeToFirestore();
}

/* =====================================================
   VIEW MANAGEMENT
===================================================== */
function openUnitDetail(unit, evt, unitType) {
  // Ignore if the click originated from a remove button
  if (evt && evt.target.closest('.unit-std-remove')) return;
  detailUnit     = unit;
  detailUnitType = unitType || currentUnitType[currentGrade];
  currentView    = 'unit';
  const typeLabel = detailUnitType === 'hum' ? 'Humanities ' : 'ELA ';
  document.getElementById('mainCtrl').style.display   = 'none';
  document.getElementById('detailCtrl').style.display  = 'flex';
  document.getElementById('detailTitle').textContent   = `Grade ${currentGrade} — ${typeLabel}${unit}`;
  document.getElementById('mainView').style.display    = 'none';
  document.getElementById('detailView').style.display  = 'flex';
  renderDetailView();
}

function closeUnitDetail() {
  currentView = 'main';
  detailUnit  = null;
  document.getElementById('mainCtrl').style.display   = 'flex';
  document.getElementById('detailCtrl').style.display  = 'none';
  document.getElementById('mainView').style.display    = 'flex';
  document.getElementById('detailView').style.display  = 'none';
  render();
}

/*
 * ELA-only unit map — used by renderPool() for pip display on the active
 * unit type (ELA or Hum). Returns { sid: [unitNums…] }.
 */
function getActiveStdUnitMap() {
  const asgn = activeAssignments();
  const map  = {};
  for (let u = 1; u <= 6; u++) {
    for (const sid of (asgn[currentGrade][String(u)] || [])) {
      if (!map[sid]) map[sid] = [];
      map[sid].push(u);
    }
  }
  return map;
}

/*
 * Combined ELA + Humanities unit map for the sidebar coverage counter.
 * Returns { sid: count } (integer, max 12 per grade).
 */
function getCombinedStdCountMap() {
  const counts = {};
  for (let u = 1; u <= 6; u++) {
    for (const sid of (assignments[currentGrade][String(u)] || [])) {
      counts[sid] = (counts[sid] || 0) + 1;
    }
    for (const sid of (humAssignments[currentGrade][String(u)] || [])) {
      counts[sid] = (counts[sid] || 0) + 1;
    }
  }
  return counts;
}

/* Legacy alias — kept for any existing callers */
function getStdUnitMap() { return getActiveStdUnitMap(); }

function buildLookup(grade) {
  const m = {};
  Object.values(STANDARDS[grade]).forEach(arr => arr.forEach(s => { m[s.id] = s; }));
  return m;
}

/* =====================================================
   DRAG & DROP
===================================================== */
let draggedId = null;

function onDragStart(e) {
  // pool-item-card uses data-drag-id; std-card uses data-std-id
  draggedId = e.currentTarget.dataset.dragId || e.currentTarget.dataset.stdId;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'copy';
  e.dataTransfer.setData('text/plain', draggedId);
}
function onDragEnd(e)     { e.currentTarget.classList.remove('dragging'); }
function onDragOver(e, el) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'copy';
  el.classList.add('drag-over');
}
function onDragLeave(e, el) {
  if (e.relatedTarget && el.contains(e.relatedTarget)) return;
  el.classList.remove('drag-over');
}
function onDrop(e, unit, el) {
  e.preventDefault();
  el.classList.remove('drag-over');
  const payload = e.dataTransfer.getData('text/plain') || draggedId;
  if (!payload) return;
  if (payload.startsWith('genre::')) {
    addPoolItem('genre', payload.slice(7), unit);
  } else if (payload.startsWith('perf::')) {
    addPoolItem('perf', payload.slice(6), unit);
  } else if (payload.startsWith('theme::')) {
    addPoolItem('theme', payload.slice(7), unit);
  } else {
    addToUnit(payload, unit);
  }
}

/* =====================================================
   DESCRIPTION INPUT HELPERS
===================================================== */
const MAX_WORDS = 10;

function wordCount(text) {
  return text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
}

/*
 * Called oninput on the description field.
 * Enforces the 10-word cap by trimming excess words, then saves.
 * The counter span is always the next sibling of the input.
 */
function handleDescInput(sid, rowIndex, inputEl) {
  let val   = inputEl.value;
  let count = wordCount(val);

  // Hard cap: if over the limit, trim to the first MAX_WORDS words.
  // This lets users edit within existing words but blocks new word 11.
  if (count > MAX_WORDS) {
    val = val.trim().split(/\s+/).slice(0, MAX_WORDS).join(' ');
    inputEl.value = val;
    count = MAX_WORDS;
  }

  // Update counter badge (next sibling of input)
  const counterEl = inputEl.nextElementSibling;
  if (counterEl) {
    counterEl.textContent = `${count}/${MAX_WORDS}`;
    counterEl.className = 'asmt-word-count' + (count >= MAX_WORDS ? ' at-limit' : '');
  }

  updateAssessment(sid, rowIndex, 'description', val);
}

/* =====================================================
   RENDER — ASSESSMENT TIMELINE SIDEBAR
===================================================== */
function renderDetailSidebar() {
  const u        = String(detailUnit);
  const unitStds = activeAssignments()[currentGrade][u] || [];
  const unitData = (activeAssessments()[currentGrade] || {})[u] || {};

  // Collect every assessment row that has BOTH type and date
  const scheduled = [];
  unitStds.forEach(sid => {
    (unitData[sid] || []).forEach((row, i) => {
      if (row.type && row.date) scheduled.push({ sid, rowIndex: i, type: row.type, date: row.date, description: row.description || '' });
    });
  });

  const el = document.getElementById('detailSidebarBody');
  if (!el) return;

  if (scheduled.length === 0) {
    el.innerHTML = `<div class="detail-sb-empty">No assessments scheduled yet</div>`;
    return;
  }

  // Group by calendar week (keyed by Monday's ISO date)
  const weekMap = new Map(); // key → { label, items[] }
  scheduled.forEach(item => {
    const key = weekKey(item.date);
    if (!weekMap.has(key)) weekMap.set(key, { label: fmtWeekRange(mondayOf(item.date)), items: [] });
    weekMap.get(key).items.push(item);
  });

  // Sort weeks chronologically; sort items within each week
  const sortedWeeks = [...weekMap.entries()].sort((a, b) => a[0].localeCompare(b[0]));
  sortedWeeks.forEach(([, w]) => w.items.sort(compareAssessments));

  el.innerHTML = sortedWeeks.map(([, w]) => {
    const rows = w.items.map(item => `
      <div class="detail-sb-row">
        <span class="detail-sb-code">${item.sid}</span>
        <span class="detail-sb-meta">${item.description || `Assessment ${item.rowIndex + 1}`} &nbsp;&middot;&nbsp; <span class="detail-sb-date">${fmtDate(item.date)}</span></span>
      </div>`).join('');
    return `<div class="detail-sb-week"><div class="detail-sb-week-hdr">${w.label}</div>${rows}</div>`;
  }).join('');
}

function renderDetailView() {
  const u          = String(detailUnit);

  const genreItems = activeGenreAssignments()[currentGrade][u] || [];
  const perfItems  = activePerfAssignments()[currentGrade][u] || [];
  const themeItems = activeThemeAssignments()[currentGrade][u] || [];

  /* ── Always render EU / EQ at the top ───────────────── */
  const topHtml = buildDetailTopHtml();

  /* ── Bottom: standards, genres, performance tasks ────── */
  const hasMultipleSections = (stds.length > 0 ? 1 : 0) + (genreItems.length > 0 ? 1 : 0) + (perfItems.length > 0 ? 1 : 0) + (themeItems.length > 0 ? 1 : 0) > 1;

    /* ── Standards cards ─────────────────────────────────── */
    if (stds.length > 0) {
      if (hasMultipleSections) bottomHtml += `<div class="pool-section-hdr">Standards</div>`;
      bottomHtml += stds.map(sid => {
        const std = lookup[sid];
        if (!std) return '';
        const color = strandColor(sid);
        const rows  = getAssessmentRows(currentGrade, detailUnit, sid);

        const asmtRows = [0, 1].map(i => {
          const row  = rows[i] || { type:'', date:'', description:'' };

            <div class="asmt-row">
              <div class="asmt-row-top">
                <span class="asmt-label">Assessment ${i + 1}</span>
                <select class="asmt-select"
                        onchange="updateAssessment('${sid}',${i},'type',this.value)">
                  <option value=""            ${row.type===''            ?'selected':''}>&#8212; select type &#8212;</option>
                  <option value="Quiz"        ${row.type==='Quiz'        ?'selected':''}>Quiz</option>
                  <option value="Writing Task"${row.type==='Writing Task'?'selected':''}>Writing Task</option>
                  <option value="Project"     ${row.type==='Project'     ?'selected':''}>Project</option>
                </select>
                <input type="date" class="asmt-date" value="${row.date || ''}"
                       onchange="updateAssessment('${sid}',${i},'date',this.value)">
              </div>
              <div class="asmt-row-bottom">
                <input type="text" class="asmt-desc" placeholder="Brief description..."
                       value="${desc.replace(/"/g, '&quot;')}"
                       oninput="handleDescInput('${sid}',${i},this)">
                <span class="asmt-word-count${wc >= MAX_WORDS ? ' at-limit' : ''}">${wc}/${MAX_WORDS}</span>

        return `
          <div class="std-detail-card" style="border-left-color:${color}">
            <div class="std-detail-code" style="color:${color}">${std.id}</div>
            <div class="std-detail-desc">${std.desc}</div>
            <hr class="asmt-divider">
            <div class="asmt-rows">${asmtRows}</div>
          </div>`;
      }).join('');
    }

    /* ── Genre Pool cards ────────────────────────────────── */
    if (genreItems.length > 0) {
      if (hasMultipleSections) bottomHtml += `<div class="pool-section-hdr">Genre Pool</div>`;
      bottomHtml += genreItems.map(label => {
        const gd   = (activeGenreDetails()[currentGrade] || {})[u] || {};

        const safeLabel = label.replace(/"/g, '&quot;');

          <div class="pool-detail-card" style="border-left-color:${GENRE_COLOR}">

                      oninput="updatePoolDetail(this)">${text}</textarea>

      }).join('');

    /* ── Performance Task cards ──────────────────────────── */
    if (perfItems.length > 0) {
      if (hasMultipleSections) bottomHtml += `<div class="pool-section-hdr">Performance Tasks</div>`;
      bottomHtml += perfItems.map(label => {
        const pd   = (activePerfDetails()[currentGrade] || {})[u] || {};
        const text = (pd[label] || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        const safeLabel = label.replace(/"/g, '&quot;');
        return `
          <div class="pool-detail-card" style="border-left-color:${PERF_COLOR}">
            <div class="pool-detail-label">
              <span class="pool-tag perf-tag">Task</span>
              ${label}
            </div>

    /* ── Theme cards ─────────────────────────────────────── */

      bottomHtml += themeItems.map(label => {
        const td   = (activeThemeDetails()[currentGrade] || {})[u] || {};
        const text = (td[label] || '').replace(/</g, '&lt;').replace(/>/g, '&gt;');

        return `
          <div class="pool-detail-card" style="border-left-color:${THEME_COLOR}">

                      oninput="updatePoolDetail(this)">${text}</textarea>

      }).join('');
    }
  }

  /* Wrap in two divs so renderDetailTop() can patch just the top without
     disturbing assessment inputs and textareas below. */
  el.innerHTML =
    `<div id="detailTop">${topHtml}</div>` +
    `<div id="detailBottom">${bottomHtml}</div>`;

  renderDetailSidebar();
}

function cell(v) {
  const s = String(v == null ? '' : v);
  return (s.includes(',') || s.includes('"') || s.includes('\n'))
    ? '"' + s.replace(/"/g, '""') + '"' : s;
}

  const rows = [['Grade','Standard ID','Strand','Description','Units Assigned','Coverage Count']];
  STRANDS.forEach(strand => {
    STANDARDS[currentGrade][strand].forEach(std => {
      const units = map[std.id] || [];
      rows.push([currentGrade, std.id, strand, cell(std.desc), units.join('|'), units.length]);
    });
  });
  const csv  = rows.map(r => r.join(',')).join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = Object.assign(document.createElement('a'), {
    href: url, download: `ela-unit-plan-grade${currentGrade}.csv`
  });
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

function exportPDF() {
  const map  = getStdUnitMap();
  const HEX  = ['#C0392B','#B7770D','#1A8C4E','#2471A3','#7D3C98','#0E8C7A'];
  let rows = '';
  STRANDS.forEach(strand => {
    const { color } = STRAND_META[strand];
    STANDARDS[currentGrade][strand].forEach(std => {
      const units = map[std.id] || [];
      const pills = units.map(u =>
        `<span style="display:inline-block;background:${HEX[u-1]};color:#fff;border-radius:3px;
                      padding:1px 5px;font-size:.63rem;margin:1px;font-weight:700;">U${u}</span>`
      ).join(' ');
      rows += `
        <tr>
          <td style="color:${color};font-weight:700;white-space:nowrap">${std.id}</td>
          <td style="color:${color};white-space:nowrap;font-size:.72rem">${strand}</td>
          <td>${std.desc}</td>
          <td style="text-align:center">${pills||'<span style="color:#aaa">—</span>'}</td>
          <td style="text-align:center;font-weight:600">${units.length}/6</td>
        </tr>`;
    });
  });

  const win = window.open('', '_blank');
  win.document.write(`<!DOCTYPE html>
<html lang="en"><head>
  <meta charset="UTF-8">
  <title>ELA Unit Plan — Grade ${currentGrade}</title>
  <style>
    body{font-family:Georgia,serif;padding:32px 40px;color:#222;font-size:12px}
    h1{font-size:1.4rem;margin-bottom:4px}
    .sub{color:#666;font-size:.85rem;margin-bottom:22px}
    table{width:100%;border-collapse:collapse}
    th{background:#1D3557;color:#fff;padding:7px 10px;text-align:left;font-size:.72rem;
       text-transform:uppercase;letter-spacing:.05em}
    td{padding:6px 9px;border-bottom:1px solid #ddd;vertical-align:top;line-height:1.45}
    tr:nth-child(even) td{background:#F8F5F0}
    @media print{body{padding:16px 20px}}
  </style>
</head><body>
  <h1>ELA Common Core Unit Plan</h1>
  <div class="sub">Grade ${currentGrade} &nbsp;&middot;&nbsp; All Standards &nbsp;&middot;&nbsp; ${new Date().toLocaleDateString()}</div>
  <table>
    <thead><tr>
      <th>Standard</th><th>Strand</th><th>Description</th>
      <th style="text-align:center">Units</th><th style="text-align:center">Coverage</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>
  <script>setTimeout(()=>window.print(),400);<\/script>
</body></html>`);
  win.document.close();
}
